name: astroview
description: "NASA Astronomy Picture of the Day cross-platform Flutter app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.0
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  cached_network_image: ^3.3.0
  share_plus: ^7.2.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png